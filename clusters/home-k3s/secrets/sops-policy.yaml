apiVersion: codestable.local/v1
kind: SopsAgePolicyTemplate
metadata:
  name: home-k3s-sops-age
  labels:
    platform.codestable/rebuild-generation: clean-2026-07
    platform.codestable/managed-by: gitops-bootstrap-source
spec:
  secretFormat: SOPS encrypted YAML
  keyType: age
  encryptedFileGlob: "*.sops.yaml"
  agePublicRecipient: pending-user-provided
  encryptedRegex: "^(data|stringData)$"
  argocdConsumptionMode:
    default: manual-bootstrap-secret
    allowed:
      - manual-bootstrap-secret
      - sops-plugin-or-controller
  liveSync:
    secretsChildApplicationEnabled: false
    reason: recipient_pending
  gitAllowed:
    - "*.sops.yaml"
    - README.md
    - templates/*.template
  gitForbidden:
    - age private key
    - SSH private key
    - plaintext Kubernetes Secret values
    - admin password plaintext
    - Harbor robot token plaintext
    - Woodpecker agent secret plaintext
